name: bigtable_rs CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macOS-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, llvm-tools-preview
          # This action automatically handles caching for ~/.cargo and ./target

      - name: Install Tools (Protoc & cargo-llvm-cov)
        uses: taiki-e/install-action@v2
        with:
          tool: protoc, cargo-llvm-cov

      - name: Check fmt
        run: cargo fmt -- --check
      
      - name: Cargo build
        run: cargo build
        env:
          BUILD_BIGTABLE_RS_GOOGLE_PROTO: 'true'
      
      - name: Check git status clean
        uses: CatChen/check-git-status-action@v1
        with:
          fail-if-not-clean: true

      - name: Generate Code Coverage
        # This  both 'Run tests'
        # --lcov: generates the file for Codecov
        # --ignore-filename-regex: excludes your google/ folder
        run: >
          cargo llvm-cov --no-cfg-coverage --lcov --output-path lcov.info
          --ignore-filename-regex "google/"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./lcov.info
          flags: rust
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      
      
