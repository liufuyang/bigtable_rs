name: bigtable_rs CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macOS-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, llvm-tools-preview
          # This action automatically handles caching for ~/.cargo and ./target

      - name: Install Tools (Protoc & grcov)
        uses: taiki-e/install-action@v2
        with:
          tool: protoc, grcov

      - name: Check fmt
        run: cargo fmt -- --check

      - name: Cargo build
        run: cargo build
        env:
          BUILD_BIGTABLE_RS_GOOGLE_PROTO: 'true'

      - name: Check git status clean
        uses: CatChen/check-git-status-action@v1
        with:
          fail-if-not-clean: true

      - name: Run tests
        run: cargo test --verbose
        env:
          CARGO_INCREMENTAL: '0'
          RUSTFLAGS: '-Cinstrument-coverage'
          RUSTDOCFLAGS: '-Cinstrument-coverage'

      - name: Run grcov
        run: >
          grcov . --binary-path target/debug/deps/ -s . -t lcov --branch 
          --ignore-not-existing --ignore '../**' --ignore '/*' 
          --ignore 'bigtable_rs/src/google/*' --keep-only 'bigtable_rs/src/*' 
          -o coverage.lcov

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4 # Updated to v4
        with:
          files: ./coverage.lcov
          flags: rust
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }} # Required for v4+ in some cases