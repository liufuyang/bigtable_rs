name: bigtable_rs CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ] # macOS-latest is ignored for now as there is no docker on it, also we might not really need to verify on mac

    steps:
      - name: Start Bigtable Emulator
        run: |
          docker run --rm -d -p 8086:8086 --name bigtable-emulator \
          google/cloud-sdk:latest \
          gcloud beta emulators bigtable start --host-port=0.0.0.0:8086

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, llvm-tools-preview
          # This action automatically handles caching for ~/.cargo and ./target

      - name: Install Tools (Protoc & cargo-llvm-cov)
        uses: taiki-e/install-action@v2
        with:
          tool: protoc, cargo-llvm-cov

      - name: Check fmt
        run: cargo fmt -- --check
      
      - name: Cargo build
        run: cargo build
        env:
          BUILD_BIGTABLE_RS_GOOGLE_PROTO: 'true'
      
      - name: Check git status clean
        uses: CatChen/check-git-status-action@v1
        with:
          fail-if-not-clean: true

      - name: Generate Code Coverage
        # This  both 'Run tests'
        # --lcov: generates the file for Codecov
        # --ignore-filename-regex: excludes your google/ folder
        env:
          BIGTABLE_EMULATOR_HOST: localhost:8086

        # Use cargo llvm-cov to run test and generate coverage report
        # For local running, use command:
        # BIGTABLE_EMULATOR_HOST=localhost:8086 cargo llvm-cov --no-cfg-coverage  --ignore-filename-regex "google/" --features integration_tests --html --open
        run: >
          cargo llvm-cov --no-cfg-coverage --lcov --output-path lcov.info
          --ignore-filename-regex "google/" --features integration_tests

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./lcov.info
          flags: rust
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Emulator Logs on Failure
        if: failure() # Only runs if the tests (or setup) fail
        run: docker logs bigtable-emulator
      
      
