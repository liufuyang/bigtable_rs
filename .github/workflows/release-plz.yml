name: Release-plz

on:
  workflow_run:
    workflows: ["bigtable_rs CI"] # Must match the 'name:' in CI.yaml exactly
    types:
      - completed

jobs:

  # Release unpublished packages.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    # This line is the "gatekeeper" — it prevents release-plz from running if CI failed
    # This logic covers all bases:
    # 1. Only runs in your repo (not forks)
    # 2. Only if the CI actually passed
    # 3. Only if the CI was a 'push' to main
    if: |
      github.repository_owner == 'liufuyang' && 
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    permissions:
      contents: write
      pull-requests: read
      id-token: write # Required for Trusted Publishing
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'liufuyang' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}